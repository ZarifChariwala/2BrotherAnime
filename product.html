<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2brotherAnime | Baka Trio Oversize Drop-Shoulder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/product.css">
</head>
<body>

<header>
    <h1>2brotherAnime</h1>
    <nav>
        <a href="HomePage.html">Home</a>
        <a href="loginPage.html">Login</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">Cart</a>
    </nav>
</header>

<section class="product-page">

    <!-- Product Images -->
    <div class="product-images">
        <img id="productImage" src="" alt="Product Image">
    </div>

    <!-- Product Info -->
    <div class="product-info">
        <h2 id="productName">Product Name</h2>
        <div class="price" id="productPrice">$0.00</div>

        <!-- Size Selector -->
        <label for="size">Select Size</label>
        <select id="size" name="size">
            <option value="S">Small</option>
            <option value="M">Medium</option>
            <option value="L">Large</option>
            <option value="XL">X-Large</option>
        </select>

        <!-- Add to Cart -->
        <button id="addToCartButton">Add to Cart</button>

        <!-- Description -->
        <div class="description">
            <p>Unisex Oversize Fit | 100% Cotton Fabric</p>
            <p>Relaxed streetwear aesthetic with bold graphic detail. Comfortable oversized fit perfect for anime fans.</p>
            <p>Shipping & Returns: Fast shipping available. Free returns within 30 days.</p>
        </div>
    </div>

</section>

</body>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const product = JSON.parse(localStorage.getItem("selectedProduct"));

    if (product) {
        document.getElementById("productName").textContent = product.name;
        document.getElementById("productPrice").textContent = "$" + product.price;
        document.getElementById("productImage").src = product.image;
    } else {
        document.getElementById("productName").textContent = "Product not found";
    }
});
</script>
</html>
